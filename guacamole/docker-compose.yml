services:
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: guacamole-guacd
    volumes:
      # Shared drive surfaced inside the RDP session. Files dropped via the
      # Guacamole sidebar (or copied by the user inside Windows) live here
      # on the host, persisting across container recreates.
      - ./shared:/shared
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: guacamole-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guacamole_db}
      POSTGRES_USER: ${POSTGRES_USER:-guacamole_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: guacamole-web
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: postgres
      POSTGRES_DATABASE: ${POSTGRES_DB:-guacamole_db}
      POSTGRES_USER: ${POSTGRES_USER:-guacamole_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Enable TOTP 2FA extension. Each user is prompted to enroll on next
      # login (QR code → any TOTP app: Google Authenticator, Authy, Bitwarden).
      # Required before exposing publicly.
      TOTP_ENABLED: "true"
      # Serve the webapp at / instead of /guacamole/, so the public URL is
      # just https://rdp.gigglin.tech with no path suffix.
      WEBAPP_CONTEXT: "ROOT"
    ports:
      # Loopback-only fallback for emergency access via SSH tunnel
      # (ssh -L 8080:127.0.0.1:8080). Daily access goes through NPM on
      # proxy_network at https://rdp.gigglin.tech.
      - "127.0.0.1:8080:8080"
    networks:
      - default
      - proxy_network
    depends_on:
      - guacd
      - postgres
    restart: unless-stopped

# Two networks:
#   - default: internal, lets guacamole-web reach guacd + postgres.
#     Pinned subnet so iptables FORWARD rules to libvirt's virbr0
#     (192.168.122.0/24) survive compose down/up.
#   - proxy_network: shared bridge with Nginx Proxy Manager.
#     NPM reaches guacamole-web by container name on this network.
networks:
  default:
    name: guacamole_default
    ipam:
      config:
        - subnet: 172.31.0.0/16
  proxy_network:
    external: true
    name: my_server_proxy_network
