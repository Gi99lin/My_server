services:
  # ==================== Life Dashboard — Frontend ====================
  life-dashboard:
    image: ghcr.io/gi99lin/life-dashboard-frontend:latest
    container_name: life-dashboard
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      - life-dashboard-api
    ports:
      - "3000:80"
    networks:
      - life_dashboard_network
      - proxy_network

  # ==================== Life Dashboard — API ====================
  life-dashboard-api:
    image: ghcr.io/gi99lin/life-dashboard-api:latest
    container_name: life-dashboard-api
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - PORT=3001
      - WEATHER_PROXY=${WEATHER_PROXY}
      - VAULT_PATH=/vault
      - METRICS_PATH=/data/metrics.json
      - TZ=Europe/Moscow
      - DASHBOARD_PASS=${DASHBOARD_PASS}
      # Shared with status-dashboard-api so the embedded <status-map> is
      # authorised by the same login cookie (and sessions survive restarts).
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - dashboard_data:/data
      # Obsidian vault (synced via Syncthing)
      - ${VAULT_PATH:-/mnt/data/obsidian}:/vault
      # Docker socket to read container stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - life_dashboard_network
      - proxy_network

  # ==================== Life Dashboard — Collector ====================
  # Cron-based: fetches Garmin, weather, git every 2 hours
  life-dashboard-collector:
    image: ghcr.io/gi99lin/life-dashboard-collector:latest
    container_name: life-dashboard-collector
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - METRICS_PATH=/data/metrics.json
      - GARMIN_EMAIL=${GARMIN_EMAIL}
      - GARMIN_PASSWORD=${GARMIN_PASSWORD}
      - WEATHER_LAT=55.7558
      - WEATHER_LON=37.6173
      - WEATHER_PROXY=${WEATHER_PROXY}
      - GIT_REPOS_PATH=/repos
      - TZ=Europe/Moscow
    volumes:
      - dashboard_data:/data
      # Garmin tokens (persisted between restarts)
      - garmin_tokens:/root/.garminconnect
      # Git repos for commit tracking (optional, read-only)
      - ${GIT_REPOS_PATH:-/mnt/data/repos}:/repos:ro
      # Obsidian vault
      - ${VAULT_PATH:-/mnt/data/obsidian}:/vault:ro

# ==================== Networks & Volumes ====================
networks:
  life_dashboard_network:
    driver: bridge
  proxy_network:
    external: true
    name: my_server_proxy_network

volumes:
  dashboard_data:
    name: life-dashboard-data
  garmin_tokens:
    name: life-dashboard-garmin-tokens
